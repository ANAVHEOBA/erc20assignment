[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.33"

[rpc_endpoints]
lisk_sepolia = "${LISK_TESTNET_RPC_URL}"

[etherscan]
lisk_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://sepolia-blockscout.lisk.com/api" }

